        .container{max-width:650px;margin:0 auto;}
        .top-bar{text-align:center;margin-bottom:20px;}
        .import-box{background:#fff;padding:20px;border-radius:16px;box-shadow:0 4px 15px #00000010;margin-bottom:20px;}
        textarea{width:100%;height:100px;padding:12px;border:1px solid #ddd;border-radius:8px;resize:none;margin-bottom:10px;}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#4e6ef2;color:#fff;margin:0 4px;}
        .btn-gray{background:#999;}
        .card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px #00000010;text-align:center;}
        .meaning{font-size:26px;color:#222;margin-bottom:25px;}
        .input-box{width:100%;padding:14px 18px;font-size:20px;border:2px solid #eee;border-radius:10px;outline:none;text-align:center;}
        .input-box:focus{border-color:#4e6ef2;}
        .feedback{font-size:18px;height:30px;margin:15px 0;}
        .correct{color:#00b42a;}
        .wrong{color:#ff4d4f;}

    <div class="import-box">
        <div>自定义导入｜格式：英文 中文 一行一个</div>
        <textarea id="importText" placeholder="abandon 放弃\nabsorb 吸收"></textarea>
        <button class="btn" onclick="importWords()">导入生效</button>
        <button class="btn btn-gray" onclick="resetDefault()">恢复完整六级词库</button>
        <div class="tips">支持自己粘贴单词，随时切回官方几千词条</div>
    </div>

    <div class="card">
        <div class="meaning" id="meaning"></div>

        <div class="feedback" id="feedback"></div>
        <div class="progress" id="progress"></div>

let wordList = [...defaultWordList];
let shuffled = [];
let index = 0;

// 音效生成
function playSound(type){
    try{
        const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);gain.connect(audioCtx.destination);
        if(type==="ok"){osc.frequency.value=600;gain.gain.value=0.2;osc.start();osc.frequency.value=850;setTimeout(()=>osc.stop(),180);}
        else{osc.frequency.value=280;gain.gain.value=0.2;osc.start();setTimeout(()=>osc.stop(),220);}
    }catch(e){}
}

// 单词发音
function speakWord(text){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

// 加载单词
function loadWord(){
    if(index >= shuffled.length){
        alert("🎉 全套六级单词已完成！自动重新乱序开始");
        shuffled = [...wordList].sort(()=>Math.random()-0.5);
        index = 0;
    }
    const curr = shuffled[index];
    document.getElementById("meaning").innerText = curr.m;
    document.getElementById("input").value = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("progress").innerText = `进度：${index+1}/${shuffled.length}`;
    speakWord(curr.w);
}

// 导入自定义单词
function importWords(){
    const txt = document.getElementById("importText").value.trim();
    if(!txt){alert("请粘贴你的单词内容！");return;}
    const lines = txt.split("\n").filter(x=>x.trim());
    const newArr = [];
    for(let line of lines){
        const part = line.trim().split(/\s+/);
        if(part.length>=2){
            newArr.push({w:part[0],m:part.slice(1).join("")});
        }
    }
    if(newArr.length===0){alert":"格式错误！一行：英文 中文"};return;
    }
    wordList = newArr;
    shuffled = [...wordList].sort(()=>Math.random()-0.5);
    index=0;
    loadWord();
    alert(`导入成功！载入 ${newArr.length} 个自定义单词`);
}

// 恢复完整六级词库
function resetDefault(){
    wordList = [...defaultWordList];
    shuffled = [...wordList].sort(()=>Math.random()-0.5);
    index=0;
    document.getElementById("importText").value="";
    loadWord();
    alert("已恢复【完整版几千条六级核心词库】");
}

// 输入监听
document.getElementById("input").addEventListener("input",function(){
    const val = this.value.trim().toLowerCase();
    const ans = shuffled[index].w.toLowerCase();
    const fb = document.getElementById("feedback");

    if(val === ans){
        fb.innerText="✅ 拼写正确！";fb.className="feedback correct";
        playSound("ok");
        setTimeout(()=>{index++;loadWord();},450);
    }else if(ans.startsWith(val) && val.length>0){
        fb.innerText="继续输入……";fb.className="feedback";
    }else{
        fb.innerText="❌ 拼写有误";fb.className="feedback wrong";
        playSound("no");
    }
});

// 初始化启动
shuffled = [...wordList].sort(()=>Math.random()-0.5);
loadWord();
