<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六级词汇打字复习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .vocab-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .vocab-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .vocab-card.mastered {
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
        }
        .word {
            font-size: 20px;
            font-weight: bold;
            color: #1890ff;
            margin-bottom: 8px;
        }
        .meaning {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .progress {
            font-size: 12px;
            color: #999;
        }
        .typing-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .modal-meaning {
            font-size: 22px;
            margin-bottom: 24px;
            color: #333;
        }
        .typing-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 18px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        .typing-input:focus {
            border-color: #1890ff;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        .btn-primary:hover {
            background: #40a9ff;
        }
        .btn-close {
            background: #f5f5f5;
            color: #666;
            margin-left: 12px;
        }
        .feedback {
            margin-top: 16px;
            font-size: 16px;
        }
        .correct {
            color: #52c41a;
        }
        .wrong {
            color: #ff4d4f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>六级词汇打字复习</h1>
            <p>点击卡片开始打字记忆</p>
        </div>
        <div class="vocab-list" id="vocabList"></div>
    </div>

    <div class="typing-modal" id="typingModal">
        <div class="modal-content">
            <div class="modal-meaning" id="modalMeaning"></div>
            <input type="text" class="typing-input" id="typingInput" placeholder="输入英文单词">
            <div class="feedback" id="feedback"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" id="submitBtn">提交</button>
                <button class="btn btn-close" id="closeBtn">关闭</button>
            </div>
        </div>
    </div>

<script>

// 乱序算法
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 分页设置
let currentPage = 1;
const pageSize = 20;
let filteredData = [...vocabData];
let currentData = shuffleArray([...filteredData]);

// 筛选类型：all / mastered / unmastered
let filterType = "all";

function getPageData() {
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    return currentData.slice(start, end);
}

function renderPagination() {
    const totalPages = Math.ceil(currentData.length / pageSize);
    let html = `<div style="text-align: center; margin: 20px 0;">`;
    if (currentPage > 1) {
        html += `<button class="btn btn-page" onclick="changePage(${currentPage - 1})">上一页</button>`;
    }
    html += `<span style="margin: 0 15px;">第 ${currentPage} / ${totalPages} 页</span>`;
    if (currentPage < totalPages) {
        html += `<button class="btn btn-page" onclick="changePage(${currentPage + 1})">下一页</button>`;
    }
    html += `</div>`;
    document.getElementById("pagination").innerHTML = html;
}

function changePage(page) {
    currentPage = page;
    renderVocabList();
    renderPagination();
}

function applyFilter(type) {
    filterType = type;
    if (type === "mastered") {
        filteredData = vocabData.filter(item => item.mastered);
    } else if (type === "unmastered") {
        filteredData = vocabData.filter(item => !item.mastered);
    } else {
        filteredData = [...vocabData];
    }
    currentData = shuffleArray([...filteredData]);
    currentPage = 1;
    renderVocabList();
    renderPagination();
}

function renderVocabList() {
    const listEl = document.getElementById("vocabList");
    const pageData = getPageData();
    listEl.innerHTML = "";
    pageData.forEach((item, index) => {
        const globalIndex = (currentPage - 1) * pageSize + index;
        const card = document.createElement("div");
        card.className = `vocab-card ${item.mastered ? "mastered" : ""}`;
        card.innerHTML = `
            <div class="word">${item.word}</div>
            <div class="meaning">${item.meaning}</div>
            <div class="progress">${item.mastered ? "✅ 已掌握" : "📝 待复习"}</div>
        `;
        card.addEventListener("click", () => openTypingModal(globalIndex));
        listEl.appendChild(card);
    });
}

let currentWordIndex = null;

function openTypingModal(globalIndex) {
    currentWordIndex = globalIndex;
    const item = currentData[currentWordIndex];
    document.getElementById("modalMeaning").textContent = item.meaning;
    document.getElementById("typingInput").value = "";
    document.getElementById("feedback").textContent = "";
    document.getElementById("typingModal").style.display = "flex";
    document.getElementById("typingInput").focus();
}

function closeTypingModal() {
    document.getElementById("typingModal").style.display = "none";
    currentWordIndex = null;
}

function checkWord() {
    if (currentWordIndex === null) return;
    const input = document.getElementById("typingInput").value.trim().toLowerCase();
    const target = currentData[currentWordIndex].word.toLowerCase();
    const feedbackEl = document.getElementById("feedback");

    if (input === target) {
        feedbackEl.textContent = "✅ 正确！已标记为掌握";
        feedbackEl.className = "feedback correct";
        currentData[currentWordIndex].mastered = true;
        // 同步到原数据
        const originalIndex = vocabData.findIndex(v => v.word === currentData[currentWordIndex].word);
        if (originalIndex !== -1) vocabData[originalIndex].mastered = true;
        setTimeout(() => {
            closeTypingModal();
            renderVocabList();
        }, 1000);
    } else {
        feedbackEl.textContent = "❌ 拼写错误，请再试一次";
        feedbackEl.className = "feedback wrong";
    }
}

// 初始化
document.getElementById("submitBtn").addEventListener("click", checkWord);
document.getElementById("closeBtn").addEventListener("click", closeTypingModal);
document.getElementById("typingInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") checkWord();
});

// 添加筛选按钮到页面
document.querySelector(".header").insertAdjacentHTML("beforeend", `
    <div style="margin: 20px 0;">
        <button class="btn btn-filter ${filterType === 'all' ? 'btn-primary' : ''}" onclick="applyFilter('all')">全部</button>
        <button class="btn btn-filter ${filterType === 'unmastered' ? 'btn-primary' : ''}" onclick="applyFilter('unmastered')">待复习</button>
        <button class="btn btn-filter ${filterType === 'mastered' ? 'btn-primary' : ''}" onclick="applyFilter('mastered')">已掌握</button>
    </div>
`);

// 添加分页容器
document.querySelector(".container").insertAdjacentHTML("beforeend", `<div id="pagination"></div>`);

renderVocabList();
renderPagination();
</script>
</body>
</html>
